<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Normal Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn operator" data-action="clear">AC</button>
      <button class="btn operator" data-action="toggle-sign">+/−</button>
      <button class="btn operator" data-action="percent">%</button>
      <button class="btn operator highlight" data-action="divide">÷</button>

      <button class="btn" data-action="7">7</button>
      <button class="btn" data-action="8">8</button>
      <button class="btn" data-action="9">9</button>
      <button class="btn operator highlight" data-action="multiply">×</button>

      <button class="btn" data-action="4">4</button>
      <button class="btn" data-action="5">5</button>
      <button class="btn" data-action="6">6</button>
      <button class="btn operator highlight" data-action="subtract">−</button>

      <button class="btn" data-action="1">1</button>
      <button class="btn" data-action="2">2</button>
      <button class="btn" data-action="3">3</button>
      <button class="btn operator highlight" data-action="add">+</button>

      <button class="btn wide" data-action="0">0</button>
      <button class="btn" data-action="decimal">.</button>
      <button class="btn operator highlight" data-action="equals">=</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
